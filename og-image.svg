<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 紙色背景 -->
  <defs>
    <linearGradient id="paperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4ecd8"/>
      <stop offset="1" stop-color="#ebe1c9"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1a1612" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#paperGrad)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- 上下分隔雙線（仿雜誌） -->
  <line x1="60" y1="60" x2="1140" y2="60" stroke="#1a1612" stroke-width="2"/>
  <line x1="60" y1="68" x2="1140" y2="68" stroke="#1a1612" stroke-width="0.5"/>
  <line x1="60" y1="570" x2="1140" y2="570" stroke="#1a1612" stroke-width="0.5"/>
  <line x1="60" y1="578" x2="1140" y2="578" stroke="#1a1612" stroke-width="2"/>

  <!-- 頂端中繼資訊 -->
  <text x="60" y="50" font-family="JetBrains Mono, Courier, monospace" font-size="13" letter-spacing="3" fill="#3d362e">VOL. I · NO. 1 · 2026 EDITION</text>
  <text x="1140" y="50" text-anchor="end" font-family="JetBrains Mono, Courier, monospace" font-size="13" letter-spacing="3" fill="#3d362e">EASTERN EUROPE MAGAZINE</text>

  <!-- 波蘭國旗象徵（紅白橫條） -->
  <g transform="translate(60, 110)">
    <rect width="80" height="20" fill="#f4ecd8" stroke="#1a1612" stroke-width="0.5"/>
    <rect y="20" width="80" height="20" fill="#a8231d"/>
  </g>
  <text x="160" y="135" font-family="Bodoni Moda, Georgia, serif" font-style="italic" font-size="22" fill="#3d362e">Republic of Poland · Rzeczpospolita Polska</text>

  <!-- 主標題 POLSKA -->
  <text x="60" y="290" font-family="Bodoni Moda, Georgia, serif" font-size="200" font-weight="900" fill="#1a1612" letter-spacing="-2">POLSKA</text>

  <!-- 副標 -->
  <text x="60" y="345" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-size="38" fill="#a8231d">A Field Guide for Taiwanese Travellers</text>

  <!-- 中文主題 -->
  <text x="60" y="410" font-family="Noto Serif TC, serif" font-size="32" font-weight="700" fill="#1a1612">波蘭旅遊深度指南 · 2025–2026</text>

  <!-- 城市路線 -->
  <g transform="translate(60, 460)">
    <text font-family="Noto Serif TC, serif" font-size="20" font-weight="500" fill="#3d362e">
      <tspan x="0" y="0">8 日 · 4 城 · 5 段火車</tspan>
    </text>
    <text font-family="Bodoni Moda, Georgia, serif" font-size="22" font-weight="700" fill="#1a1612">
      <tspan x="0" y="35">Warszawa · Kraków · Wrocław · Poznań</tspan>
    </text>
  </g>

  <!-- 右側裝飾圓章 -->
  <g transform="translate(1000, 280)">
    <circle r="120" fill="none" stroke="#a8231d" stroke-width="2"/>
    <circle r="110" fill="none" stroke="#a8231d" stroke-width="0.5"/>
    <text text-anchor="middle" font-family="Bodoni Moda, Georgia, serif" font-style="italic" font-size="20" fill="#a8231d" font-weight="700">
      <tspan x="0" y="-25">Compiled</tspan>
      <tspan x="0" y="0">with care</tspan>
    </text>
    <text text-anchor="middle" y="35" font-family="Noto Serif TC, serif" font-size="34" font-weight="900" fill="#a8231d">🇵🇱</text>
  </g>

  <!-- 下方裝飾線 + 細節 -->
  <text x="60" y="600" font-family="JetBrains Mono, Courier, monospace" font-size="13" letter-spacing="2" fill="#3d362e">2026/10/23 — 11/01 · 七晚八日 · 個人化深度路線</text>
  <text x="1140" y="600" text-anchor="end" font-family="JetBrains Mono, Courier, monospace" font-size="13" letter-spacing="2" fill="#3d362e">jack926509.github.io/Poland-trip</text>
</svg>
